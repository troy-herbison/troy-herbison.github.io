<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volli</title>
    <!-- Tailwind CSS for clean utility styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen px-4 py-12">

    <!-- Header / Logo -->
    <div class="flex flex-col items-center text-center max-w-md">
        <!-- Logo Image File (Ensure logo.jpg is uploaded to the root of your repository) -->
        <img src="logo.jpg" alt="Volli Logo" class="w-28 h-28 rounded-2xl shadow-sm mb-4 object-cover onerror="this.style.display='none'">
        
        <p class="text-slate-600 font-medium text-sm px-4 mt-2">
            Your go-to app to find and book pickleball, tennis, basketball, and more all in one place!
        </p>
    </div>

    <!-- Social Links -->
    <div class="flex gap-6 my-6 text-slate-700">
        <a href="https://www.instagram.com/vollicourts" target="_blank" rel="noopener noreferrer" class="hover:text-slate-900 transition-colors" aria-label="Instagram">
            <i data-lucide="instagram" class="w-6 h-6"></i>
        </a>
        <a href="https://www.youtube.com/@vollicourts" target="_blank" rel="noopener noreferrer" class="hover:text-slate-900 transition-colors" aria-label="YouTube">
            <i data-lucide="youtube" class="w-6 h-6"></i>
        </a>
        <a href="https://www.tiktok.com/@volli.courts" target="_blank" rel="noopener noreferrer" class="hover:text-slate-900 transition-colors" aria-label="TikTok">
            <i data-lucide="video" class="w-6 h-6"></i>
        </a>
    </div>

    <!-- Video Embed Section -->
    <div class="w-full max-w-md aspect-video bg-black rounded-xl overflow-hidden shadow-md mb-8">
        <!-- Replace URL with your hosted video embed link (e.g., YouTube Embed format) -->
        <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Volli Promo" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <!-- Navigation Action Links -->
    <div class="w-full max-w-md flex flex-col gap-4 text-center">
        <a href="#" class="py-3.5 px-6 font-semibold text-[#004d56] hover:underline transition-all">
            Become a Volli Partner!
        </a>
        <a href="#" class="py-3.5 px-6 font-semibold text-[#004d56] hover:underline transition-all">
            Player Feedback
        </a>
        <a href="#" class="py-3.5 px-6 font-semibold text-[#004d56] hover:underline transition-all">
            Join Our Beta Program (Sports Facilities)
        </a>
        <a href="#" class="py-3.5 px-6 font-semibold text-[#004d56] hover:underline transition-all">
            Facility Feedback
        </a>
        <a href="#" class="py-3.5 px-6 font-semibold text-[#004d56] hover:underline transition-all">
            Watch the Full Promo Video
        </a>
    </div>

    <!-- Footer -->
    <footer class="mt-auto pt-12 text-xs text-slate-400 text-center border-t border-slate-200 w-full max-w-md">
        <p>© Volli 2026 · Hosted with <a href="https://pages.github.com" class="hover:underline">GitHub Pages</a></p>
    </footer>

    <script>
        // Initialize icons
        lucide.createIcons();
    </script>
</body>
</html>
